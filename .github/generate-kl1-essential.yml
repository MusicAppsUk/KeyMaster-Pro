name: Generate KL1 Essential Jack Voice

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "preflight = check only | generate = create MP3s, sync voicePackData, commit"
        required: true
        type: choice
        default: preflight
        options:
          - preflight
          - generate

permissions:
  contents: write

concurrency:
  group: kl1-essential-jack-voice
  cancel-in-progress: false

env:
  EXPECT_MISSING: "31"
  EXPECT_KL1_LINES: "31"
  SRC_KL1: tools/kl1-essential-31.json
  VOICE_LINES: tools/voice-lines.json
  VOICE_DIR: voice/en-GB
  VOICE_PACK_DATA: voicePackData.js

jobs:
  kl1-essential-jack-voice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate and merge KL1 essential lines
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/merge-kl1-essential.mjs <<'EOF'
          import { readFileSync, writeFileSync, existsSync } from 'node:fs';

          const srcPath = process.env.SRC_KL1;
          const destPath = process.env.VOICE_LINES;
          const expected = Number(process.env.EXPECT_KL1_LINES || 31);

          function fail(message) {
            console.error('FATAL: ' + message);
            process.exit(2);
          }

          function readJson(path) {
            if (!existsSync(path)) fail('missing file: ' + path);
            try {
              return JSON.parse(readFileSync(path, 'utf8'));
            } catch (error) {
              fail('invalid JSON in ' + path + ': ' + error.message);
            }
          }

          const src = readJson(srcPath);
          const manifest = readJson(destPath);

          if (!manifest || typeof manifest !== 'object' || !Array.isArray(manifest.lines)) {
            fail(destPath + ' must be an object with a lines array');
          }
          if (!Array.isArray(src)) {
            fail(srcPath + ' must be a JSON array of { id, text, file } entries');
          }
          if (src.length !== expected) {
            fail(srcPath + ' contains ' + src.length + ' entries; expected ' + expected);
          }

          const srcIds = new Set();
          const srcFiles = new Set();
          for (const [index, item] of src.entries()) {
            if (!item || typeof item !== 'object') fail(srcPath + '[' + index + '] is not an object');
            for (const key of ['id', 'text', 'file']) {
              if (typeof item[key] !== 'string' || !item[key].trim()) {
                fail(srcPath + '[' + index + '] missing non-empty string "' + key + '"');
              }
            }
            if (!item.id.startsWith('kl1-')) fail('non-KL1 id in source: ' + item.id);
            if (!item.file.startsWith('kl1-') || !item.file.endsWith('.mp3')) {
              fail('unexpected filename for ' + item.id + ': ' + item.file);
            }
            if (item.text.includes('\n') || item.text.includes('\r')) fail('raw newline in text for ' + item.id);
            if (srcIds.has(item.id)) fail('duplicate source id: ' + item.id);
            if (srcFiles.has(item.file)) fail('duplicate source file: ' + item.file);
            srcIds.add(item.id);
            srcFiles.add(item.file);
          }

          const existingIds = new Set(manifest.lines.map(item => item.id));
          const existingFiles = new Set(manifest.lines.map(item => item.file));
          let added = 0;

          for (const item of src) {
            if (existingIds.has(item.id)) continue;
            if (existingFiles.has(item.file)) fail('filename collision for new id ' + item.id + ': ' + item.file);
            manifest.lines.push(item);
            existingIds.add(item.id);
            existingFiles.add(item.file);
            added += 1;
          }

          writeFileSync(destPath, JSON.stringify(manifest, null, 2) + '\n', 'utf8');

          const kl1Count = manifest.lines.filter(item => typeof item.id === 'string' && item.id.startsWith('kl1-')).length;
          console.log('Merge OK');
          console.log('Added entries: ' + added);
          console.log('KL1 entries now in voice-lines.json: ' + kl1Count);
          if (kl1Count !== expected) fail('expected exactly ' + expected + ' KL1 entries after merge, found ' + kl1Count);
          EOF
          node /tmp/merge-kl1-essential.mjs

      - name: Dry-run Jack generator and gate on exactly 31 missing
        shell: bash
        run: |
          set -euo pipefail
          node tools/generate-jack.mjs | tee /tmp/jack-dry-run.out
          MISSING="$(grep -oE 'missing \(to do\):[[:space:]]*[0-9]+' /tmp/jack-dry-run.out | grep -oE '[0-9]+$' | tail -n1 || true)"
          echo "Parsed missing = ${MISSING:-}"
          if [ "${MISSING:-}" != "${EXPECT_MISSING}" ]; then
            echo "::error::Expected missing (to do): ${EXPECT_MISSING}, got '${MISSING:-}'. Stopping."
            exit 1
          fi
          echo "SAFE — exactly ${EXPECT_MISSING} missing."

      - name: Preflight summary
        if: ${{ inputs.mode == 'preflight' }}
        shell: bash
        run: |
          {
            echo "## Generate KL1 Essential Jack Voice — PREFLIGHT"
            echo ""
            echo "SAFE — exactly ${EXPECT_MISSING} missing."
            echo ""
            echo "No MP3s were generated."
            echo "Nothing was committed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate 31 Jack MP3s
        if: ${{ inputs.mode == 'generate' }}
        shell: bash
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ELEVENLABS_API_KEY:-}" ]; then
            echo "::error::ELEVENLABS_API_KEY secret is not set."
            exit 1
          fi
          DRY=false node tools/generate-jack.mjs | tee /tmp/jack-generate.out

      - name: Verify 31 KL1 MP3 files exist
        if: ${{ inputs.mode == 'generate' }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/verify-kl1-mp3s.mjs <<'EOF'
          import { readFileSync, existsSync } from 'node:fs';
          import { join } from 'node:path';
          const src = JSON.parse(readFileSync(process.env.SRC_KL1, 'utf8'));
          const dir = process.env.VOICE_DIR;
          const missing = [];
          for (const item of src) {
            const path = join(dir, item.file);
            if (!existsSync(path)) missing.push(path);
          }
          if (missing.length) {
            console.error('Missing KL1 MP3 files:');
            for (const path of missing) console.error(' - ' + path);
            process.exit(1);
          }
          console.log('All ' + src.length + ' KL1 MP3 files exist.');
          EOF
          node /tmp/verify-kl1-mp3s.mjs

      - name: Sync voicePackData.js
        if: ${{ inputs.mode == 'generate' }}
        shell: bash
        run: node tools/sync-voicepack-data.mjs

      - name: Verify voicePackData.js has exactly 31 KL1 entries
        if: ${{ inputs.mode == 'generate' }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/verify-voicepack.mjs <<'EOF'
          import { readFileSync } from 'node:fs';
          const text = readFileSync(process.env.VOICE_PACK_DATA, 'utf8');
          const ids = [...text.matchAll(/"((?:kl1-)[^"]+)":/g)].map(match => match[1]);
          const unique = new Set(ids);
          console.log('KL1 voicePackData entries: ' + unique.size);
          if (unique.size !== Number(process.env.EXPECT_KL1_LINES || 31)) {
            console.error('Expected exactly ' + process.env.EXPECT_KL1_LINES + ' KL1 entries in voicePackData.js, found ' + unique.size);
            process.exit(1);
          }
          EOF
          node /tmp/verify-voicepack.mjs

      - name: Commit generated voice pack changes
        if: ${{ inputs.mode == 'generate' }}
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          git add tools/voice-lines.json tools/kl1-essential-31.json voice/en-GB voicePackData.js
          if git diff --cached --quiet; then
            echo "::error::No changes staged. Expected KL1 MP3 and voicePackData changes."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add KL1 essential Jack voice lines"
          git push
          {
            echo "## Generate KL1 Essential Jack Voice — GENERATED"
            echo ""
            echo "Generated and committed the 31 essential KL1 Jack MP3 files."
            echo "Synced voicePackData.js."
          } >> "$GITHUB_STEP_SUMMARY"
