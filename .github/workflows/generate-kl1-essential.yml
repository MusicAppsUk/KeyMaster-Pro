name: Generate KL1 Essential Voice Pack

# Two modes (chosen when you run the workflow):
#   preflight  -> merge + dry-run generator + gate on "missing (to do): 31".
#                 Generates NOTHING. Commits NOTHING. Safe to run repeatedly.
#   generate   -> same gate, then actually build the 31 MP3s, sync data,
#                 bump the version, run the protected-file gate, and commit.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "preflight = check only (no generate, no commit) | generate = build + commit"
        type: choice
        default: preflight
        options:
          - preflight
          - generate

concurrency:
  group: kl1-essential-voicepack
  cancel-in-progress: false

permissions:
  contents: write

env:
  # ---- Files ----
  SRC_KL1: tools/kl1-essential-31.json
  VOICE_LINES: tools/voice-lines.json
  VOICE_DIR: voice/en-GB
  VOICE_PACK_DATA: voicePackData.js
  # ---- Gate values ----
  EXPECT_MISSING: "31"
  EXPECT_KL1: "31"
  # ---- Version bump ----
  VERSION_FROM: rc2-210
  VERSION_TO: rc2-211
  # ---- Protected baseline (never touched by the version-bump) ----
  PROTECTED_GLOBS: "coursePianoSampler.js|pianoVoice.js|assets/piano/salamander-lite"
  # ---- Generate-mode only: your repo's protected-file gate command.
  #      If your gate script lives elsewhere, change this one line.
  #      Leave blank to let the workflow auto-discover a known gate script. ----
  PROTECTED_GATE_CMD: "node tools/protected-gate.mjs"

jobs:
  kl1-essential:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show mode
        run: echo "Running in '${{ inputs.mode }}' mode."

      # --- Step 1: idempotent merge of the 31 KL1 lines into voice-lines.json ---
      # Runs in BOTH modes so the generator can see the 31 entries.
      # In preflight this change is never committed (the runner is discarded).
      - name: Merge KL1 essential into voice-lines.json (idempotent)
        run: |
          set -euo pipefail
          cat > /tmp/merge-kl1.mjs <<'EOF'
          import { readFileSync, writeFileSync, existsSync } from 'node:fs';

          const SRC = process.env.SRC_KL1;
          const DEST = process.env.VOICE_LINES;
          const EXPECT_KL1 = parseInt(process.env.EXPECT_KL1 || '31', 10);
          const KL1 = /^kl1-/i;
          const die = (m) => { console.error('FATAL: ' + m); process.exit(2); };

          const readJson = (p) => {
            if (!existsSync(p)) die('missing file: ' + p);
            try { return JSON.parse(readFileSync(p, 'utf8')); }
            catch (e) { die('invalid JSON in ' + p + ': ' + e.message); }
          };

          const src = readJson(SRC);
          const dest = readJson(DEST);

          // Normalise the source into [{ id, obj }]
          function srcEntries(d) {
            if (Array.isArray(d)) {
              return d.map((item, i) => {
                if (!item || typeof item !== 'object' || typeof item.id !== 'string')
                  die(SRC + '[' + i + '] has no string "id" field');
                return { id: item.id, obj: item };
              });
            }
            if (d && typeof d === 'object') {
              return Object.entries(d).map(([id, v]) => ({ id, obj: v }));
            }
            die(SRC + ' must be a JSON array or object');
          }
          const entries = srcEntries(src);

          // Sanity: the essential file must hold exactly 31 kl1- ids.
          const srcKl1 = entries.filter(e => KL1.test(e.id));
          if (srcKl1.length !== EXPECT_KL1)
            die(SRC + ' contains ' + srcKl1.length + ' kl1- entries, expected ' + EXPECT_KL1);

          // Guard against silent duplicate-append if the array uses a different key.
          if (Array.isArray(dest) && dest.length && !dest.some(x => x && typeof x.id === 'string'))
            die(DEST + ' is an array but items have no "id" field; cannot merge idempotently. Check schema.');

          let added = 0;
          if (Array.isArray(dest)) {
            const have = new Set(dest.map(x => x && x.id));
            for (const { id, obj } of entries) {
              if (!have.has(id)) { dest.push(obj); have.add(id); added++; }
            }
          } else if (dest && typeof dest === 'object') {
            for (const { id, obj } of entries) {
              if (!(id in dest)) { dest[id] = obj; added++; }
            }
          } else {
            die(DEST + ' must be a JSON array or object');
          }

          writeFileSync(DEST, JSON.stringify(dest, null, 2) + '\n');

          const idsNow = Array.isArray(dest) ? dest.map(x => x && x.id) : Object.keys(dest);
          const kl1Now = idsNow.filter(id => typeof id === 'string' && KL1.test(id));
          console.log('Merge OK: added ' + added + ' new entr' + (added === 1 ? 'y' : 'ies') +
                      '; voice-lines.json now has ' + kl1Now.length + ' kl1- ids.');
          if (kl1Now.length < EXPECT_KL1)
            die('after merge only ' + kl1Now.length + ' kl1- ids present, expected >= ' + EXPECT_KL1);
          EOF
          node /tmp/merge-kl1.mjs

      # --- Steps 2-4: dry-run generator, parse "missing (to do): N", gate on 31 ---
      # Runs in BOTH modes. Generator defaults to dry-run, so nothing is built here.
      - name: Preflight gate (missing must equal 31)
        run: |
          set -euo pipefail
          node tools/generate-jack.mjs | tee /tmp/jack.out
          MISSING=$(grep -oE 'missing \(to do\): [0-9]+' /tmp/jack.out | grep -oE '[0-9]+$' | tail -n1 || true)
          echo "Parsed missing = '${MISSING:-<none>}'"
          if [ "${MISSING:-}" != "${EXPECT_MISSING}" ]; then
            echo "::error::Gate failed — expected missing=${EXPECT_MISSING}, got '${MISSING:-<none>}'. Stopping."
            exit 1
          fi
          echo "Gate passed: missing == ${EXPECT_MISSING}."

      # --- Step 5: preflight ends here. Nothing generated, nothing committed. ---
      - name: Preflight summary
        if: ${{ inputs.mode == 'preflight' }}
        run: |
          echo "PREFLIGHT PASSED: missing == ${EXPECT_MISSING}."
          echo "No MP3s were generated and nothing was committed."
          echo "Next: run this workflow again with mode = generate."

      # --- Step 6: actually generate the MP3s (generate mode only) ---
      - name: Generate MP3s (DRY=false)
        if: ${{ inputs.mode == 'generate' }}
        run: |
          set -euo pipefail
          DRY=false node tools/generate-jack.mjs | tee /tmp/jack-gen.out

      # --- Step 7: verify exactly 31 kl1 MP3s exist ---
      - name: Verify 31 KL1 MP3s exist
        if: ${{ inputs.mode == 'generate' }}
        run: |
          set -euo pipefail
          COUNT=$(find "${VOICE_DIR}" -maxdepth 1 -type f -iname 'kl1-*.mp3' | wc -l | tr -d ' ')
          echo "Found ${COUNT} kl1-*.mp3 in ${VOICE_DIR}"
          if [ "${COUNT}" != "${EXPECT_KL1}" ]; then
            echo "::error::Expected ${EXPECT_KL1} kl1 MP3s in ${VOICE_DIR}, found ${COUNT}."
            exit 1
          fi

      # --- Step 8: sync voicePackData.js ---
      - name: Sync voicePackData.js
        if: ${{ inputs.mode == 'generate' }}
        run: node tools/sync-voicepack-data.mjs

      # --- Step 9: verify voicePackData.js has exactly 31 kl1- entries ---
      - name: Verify voicePackData.js has exactly 31 kl1- entries
        if: ${{ inputs.mode == 'generate' }}
        run: |
          set -euo pipefail
          cat > /tmp/check-vpd.mjs <<'EOF'
          import { readFileSync, existsSync } from 'node:fs';
          const F = process.env.VOICE_PACK_DATA;
          const EXPECT = parseInt(process.env.EXPECT_KL1 || '31', 10);
          if (!existsSync(F)) { console.error('FATAL: missing ' + F); process.exit(2); }
          const txt = readFileSync(F, 'utf8');
          const ids = new Set((txt.match(/kl1-[A-Za-z0-9_-]+/gi) || []).map(s => s.toLowerCase()));
          console.log('voicePackData.js unique kl1- ids: ' + ids.size);
          if (ids.size !== EXPECT) {
            console.error('FATAL: expected ' + EXPECT + ' kl1- ids, found ' + ids.size);
            process.exit(1);
          }
          EOF
          node /tmp/check-vpd.mjs

      # --- Step 10: bump rc2-210 -> rc2-211 (skips protected baseline files) ---
      - name: Bump version rc2-210 -> rc2-211
        if: ${{ inputs.mode == 'generate' }}
        run: |
          set -euo pipefail
          FILES=$(git ls-files | grep -vE "${PROTECTED_GLOBS}" | while read -r f; do
            if grep -Ilq "${VERSION_FROM}" "$f"; then echo "$f"; fi
          done)
          if [ -z "${FILES}" ]; then
            echo "::error::No tracked, non-protected files contain '${VERSION_FROM}'. Nothing to bump."
            exit 1
          fi
          echo "Bumping ${VERSION_FROM} -> ${VERSION_TO} in:"
          echo "${FILES}" | sed 's/^/  /'
          echo "${FILES}" | while read -r f; do
            [ -n "$f" ] && sed -i "s/${VERSION_FROM}/${VERSION_TO}/g" "$f"
          done

      # --- Step 11: protected-file gate (fail-closed if not found) ---
      - name: Protected-file gate
        if: ${{ inputs.mode == 'generate' }}
        run: |
          set -euo pipefail
          CMD="${PROTECTED_GATE_CMD:-}"
          discover() {
            for c in tools/protected-gate.mjs tools/check-protected.mjs scripts/protected-gate.mjs; do
              if [ -f "$c" ]; then echo "node $c"; return 0; fi
            done
            echo ""
          }
          # If an explicit "node <script>" was given but the script is missing, try discovery.
          if [ -n "$CMD" ]; then
            set -- $CMD
            if [ "${1:-}" = "node" ] && [ -n "${2:-}" ] && [ ! -f "${2}" ]; then
              echo "Configured gate script '${2}' not found; searching known locations..."
              CMD="$(discover)"
            fi
          else
            CMD="$(discover)"
          fi
          if [ -z "$CMD" ]; then
            echo "::error::Protected-file gate not found. Set PROTECTED_GATE_CMD (workflow env) to your repo's gate command, then rerun generate."
            exit 1
          fi
          echo "Running protected-file gate: $CMD"
          eval "$CMD"

      # --- Step 12: commit, only after every gate above has passed ---
      - name: Commit
        if: ${{ inputs.mode == 'generate' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "KL1 essential voice pack: 31 lines generated, voicePackData synced, ${VERSION_FROM} -> ${VERSION_TO}"
          git push
