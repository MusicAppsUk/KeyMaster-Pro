# .github/workflows/build-salamander-lite.yml
# =============================================================================
# KeyMaster Pro — Course sampled-piano pack builder (Salamander "lite").
#
# WHAT THIS DOES
#   Runs on GitHub's own runners (which HAVE network), downloads a small curated
#   set of Salamander Grand Piano notes (Yamaha C5, CC-BY 3.0), copies them as-is
#   (already web-safe MP3, full natural tails), writes them to  assets/piano/salamander-lite/ , generates a
#   manifest.json the in-app sampler reads, writes the CC-BY attribution into
#   NOTICE, and commits the result back to the repo. No by-hand tablet uploads.
#
# HOW TO RUN
#   Push this file to .github/workflows/ , open the repo's "Actions" tab, pick
#   "Build Salamander lite piano pack", and click "Run workflow". (Same manual
#   dispatch pattern as the Jack voice pipeline.)
#
# SOURCE & LICENCE
#   Audio is fetched from the Tone.js public audio repository's Salamander folder
#   (https://tonejs.github.io/audio/salamander/) — a long-standing, widely-used
#   mirror of Alexander Holm's Salamander Grand Piano V3 whose folder carries the
#   original CC-BY licence and author credit. CC-BY 3.0 permits redistribution
#   (incl. commercial) with attribution, so the mirror is legally equivalent to
#   the author's archive. Pass 1: files are copied AS-IS (already web-safe MP3) —
#   full natural tails, no trim, no re-encode, no normalisation, no looping. Only
#   selection + mirroring; declared in NOTICE + manifest.
# =============================================================================

name: Build Salamander lite piano pack

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run = build + report only (no commit). generate = build + commit the pack."
        type: choice
        options:
          - dry-run
          - generate
        default: dry-run

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build lite pack + manifest + NOTICE
        run: |
          set -euo pipefail

          OUT="assets/piano/salamander-lite"
          SRC="https://tonejs.github.io/audio/salamander"
          mkdir -p "$OUT"

          # 18 notes, every minor third A1..C6 (engine pitch-shifts max ±1.5
          # semitones). Salamander names sharps Ds/Fs; Eb == Ds enharmonically.
          NOTES="A1:33 C2:36 Ds2:39 Fs2:42 A2:45 C3:48 Ds3:51 Fs3:54 A3:57 C4:60 Ds4:63 Fs4:66 A4:69 C5:72 Ds5:75 Fs5:78 A5:81 C6:84"

          ZONES=""
          for pair in $NOTES; do
            note="${pair%%:*}"
            midi="${pair##*:}"
            url="${SRC}/${note}.mp3"
            echo "  - ${note} (midi ${midi})  <-  ${url}"
            # Pass 1: copy the source MP3 AS-IS — full natural tails, no trim and
            # no re-encode (avoids a second lossy pass). Fail loudly if missing.
            curl -fSL --retry 3 -o "${OUT}/${note}.mp3" "$url"
            sep=""; [ -n "$ZONES" ] && sep=","
            ZONES="${ZONES}${sep}{\"note\": \"${note}\", \"midi\": ${midi}, \"file\": \"${note}.mp3\"}"
          done

          # ---- manifest.json (the in-app sampler reads this) ----------------
          ATTR="Piano samples adapted from Salamander Grand Piano by Alexander Holm, licensed under Creative Commons Attribution 3.0 Unported."
          {
            printf '%s\n' '{'
            printf '  "version": "p1",\n'
            printf '  "instrument": "Salamander Grand Piano (lite)",\n'
            printf '  "source": "Salamander Grand Piano V3 by Alexander Holm (Yamaha C5)",\n'
            printf '  "sourceUrl": "https://tonejs.github.io/audio/salamander/",\n'
            printf '  "license": "CC-BY-3.0",\n'
            printf '  "licenseUrl": "https://creativecommons.org/licenses/by/3.0/",\n'
            printf '  "attribution": "%s",\n' "$ATTR"
            printf '  "adaptations": "Mirrored from the Tone.js Salamander V3 set; a curated 18-note subset selected. Files are otherwise UNMODIFIED: original MP3 with full natural tails, not re-encoded, not trimmed, not loudness-normalised, not looped. Filenames unchanged.",\n'
            printf '  "velocityLayers": 1,\n'
            printf '  "spacing": "minor-third (every 3 semitones)",\n'
            printf '  "zones": [%s\n' "$ZONES"
            printf '  ]\n'
            printf '%s\n' '}'
          } > "${OUT}/manifest.json"
          echo "wrote ${OUT}/manifest.json"

          # ---- NOTICE (CC-BY attribution at the repo root) -----------------
          {
            printf '%s\n' 'KeyMaster Pro — third-party asset attribution'
            printf '%s\n' '============================================='
            printf '\n'
            printf '%s\n' 'Course sampled piano (assets/piano/salamander-lite/)'
            printf '%s\n' '-----------------------------------------------------'
            printf '%s\n' "$ATTR"
            printf '%s\n' 'Licence: https://creativecommons.org/licenses/by/3.0/'
            printf '%s\n' 'Source:  Salamander Grand Piano V3 (Yamaha C5), via the Tone.js public'
            printf '%s\n' '         audio repository mirror (https://tonejs.github.io/audio/salamander/).'
            printf '\n'
            printf '%s\n' 'Adaptations made for KeyMaster Pro: a curated subset of 18 notes (every minor'
            printf '%s\n' 'third, A1-C6) was MIRRORED from the Tone.js public Salamander V3 set. The'
            printf '%s\n' 'files are otherwise UNMODIFIED: original MP3 with full natural tails, not'
            printf '%s\n' 're-encoded, not trimmed, not loudness-normalised, and not looped. Original'
            printf '%s\n' 'Salamander note filenames were kept (files were NOT renamed).'
          } > NOTICE
          echo "wrote NOTICE"

          # ---- report -------------------------------------------------------
          echo "----- lite pack built -----"
          ls -la "$OUT"
          echo "file count: $(find "$OUT" -name '*.mp3' | wc -l) mp3 + manifest"
          echo "total human:"; du -sh "$OUT" | cut -f1

      - name: Commit pack
        if: ${{ github.event.inputs.mode == 'generate' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/piano/salamander-lite NOTICE
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build Salamander lite Course piano pack (CC-BY 3.0, adapted)"
            git push
          fi

      - name: Dry-run summary
        if: ${{ github.event.inputs.mode != 'generate' }}
        run: |
          echo "DRY-RUN complete — pack was built and verified in the runner but NOT committed."
          echo "Re-run with mode=generate to commit assets/piano/salamander-lite/ + NOTICE."
