name: Generate Jack voice pack
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = preview (no cost). false = generate the 17-line Jack pack."
        default: "true"
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
